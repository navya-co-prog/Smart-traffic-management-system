<!DOCTYPE html>
<html>

<head>

    <title>AI Smart Traffic Management</title>

    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        h1{
            color:cyan;
            margin-top:20px;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:flex-start;
            gap:30px;
            margin-top:20px;
        }

        img{
            width:700px;
            border:4px solid white;
            border-radius:10px;
        }

        .dashboard{
            width:300px;
            background:#111;
            padding:20px;
            border-radius:10px;
            border:2px solid white;
            text-align:left;
        }

        .dashboard h2{
            color:yellow;
            text-align:center;
        }

        .dashboard p{
            font-size:22px;
            margin:15px 0;
        }

        .traffic-light{
         background:#222;
         width:80px;
         padding:10px;
         border-radius:10px;
         margin:20px auto;
        text-align:center;
        }

     .light{
        width:50px;
        height:50px;
        border-radius:50%;
       margin:10px auto;
     }

   .red{
    background:red;
    }

   .yellow{
    background:yellow;
    }

  .green{
    background:green;
    }

   .traffic-light{
    background:#222;
    width:80px;
    padding:10px;
    border-radius:10px;
    margin:20px auto;
    text-align:center;
   }

   .light{
    width:50px;
    height:50px;
    border-radius:50%;
    margin:10px auto;
    opacity:0.2;
   }

   .red{
    background:red;
   }

   .yellow{
    background:yellow;
    }

   .green{
    background:green;
    }

   .active{
    opacity:1;
    box-shadow:0 0 20px white;
    }



    </style>

</head>

<body>

    <h1>AI Smart Traffic Management System</h1>

    <div class="container">

        <img src="{{ url_for('video') }}">

        <div class="dashboard">

            <h2>Live Dashboard</h2>

            <p id="cars">Cars: 0</p>

            <p id="trucks">Trucks: 0</p>

            <p id="buses">Buses: 0</p>

            <p id="motorcycles">Motorcycles: 0</p>

            <p id="total">Total Vehicles: 0</p>

            <p id="status">Traffic Status: Low Traffic</p>

        
       <div class="traffic-light">
       <div id="red-light" class="light red"></div>
       <div id="yellow-light" class="light yellow"></div>
      <div id="green-light" class="light green"></div>
      </div>

<p id="signal-color">Signal: GREEN</p>

      <p id="signal">Signal Time: 0 sec</p>
        </div>

    </div>

<script>

async function updateDashboard(){

    const response = await fetch('/data');

    const data = await response.json();

    document.getElementById("cars").innerText =
        "Cars: " + data.cars;

    document.getElementById("trucks").innerText =
        "Trucks: " + data.trucks;

    document.getElementById("buses").innerText =
        "Buses: " + data.buses;

    document.getElementById("motorcycles").innerText =
        "Motorcycles: " + data.motorcycles;

    document.getElementById("total").innerText =
        "Total Vehicles: " + data.total;

    document.getElementById("status").innerText =
        "Traffic Status: " + data.status;

    document.getElementById("signal").innerText =
        "Signal Time: " + data.signal_time + " sec";


    const redLight = document.getElementById("red-light");
const yellowLight = document.getElementById("yellow-light");
const greenLight = document.getElementById("green-light");

redLight.classList.remove("active");
yellowLight.classList.remove("active");
greenLight.classList.remove("active");

if (data.status === "High Traffic") {
    redLight.classList.add("active");
    document.getElementById("signal-color").innerText =
        "Signal: RED";
}
else if (data.status === "Medium Traffic") {
    yellowLight.classList.add("active");
    document.getElementById("signal-color").innerText =
        "Signal: YELLOW";
}
else {
    greenLight.classList.add("active");
    document.getElementById("signal-color").innerText =
        "Signal: GREEN";
}

}

setInterval(updateDashboard, 1000);

</script>


</body>
</html>

</body>
</html>
